spring:
  flyway:
    url: jdbc:postgresql://localhost:5432/mydb
    user: postgres
    password: 1234

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: core-service
              uri: http://localhost:8081
              predicates:
                - Path=/core/**
  profiles:
    active: docker

server:
  port: 8080